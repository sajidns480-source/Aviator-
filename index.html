<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝗞𝗘𝗩𝗜𝗡 𝗦𝗠𝗔𝗥𝗧 𝗧𝗥𝗔𝗗𝗘</title>
    <style>
        :root {
            --primary: #ff003c;
            --primary-glow: rgba(255, 0, 60, 0.4);
            --telegram: #0088cc;
            --telegram-glow: rgba(0, 136, 204, 0.5);
            --bg-dark: #0a0a0c;
            --glass: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-muted: #8a8a93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Game Frame Background --- */
        .game-frame { 
            width: 100%; height: 100%; border: none; 
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* --- Canvas Background --- */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* --- App Container (আপনার দেওয়া পারফেক্ট ছোট সাইজ) --- */
        .app-container {
            position: fixed;
            z-index: 1000;
            width: 155px; 
            touch-action: none;
        }

        /* --- Glassmorphism Card Structure --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px 10px 10px 10px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
        }

        /* RGB বর্ডার */
        .rgb-box {
            padding: 2px;
            border-radius: 17px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            animation: move-border 8s linear infinite;
        }

        @keyframes move-border {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        .hidden {
            display: none !important;
        }

        /* --- Typography --- */
        h1.title {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #ffd700;
        }

        h1.premium-title {
            color: #ff003c;
            font-size: 10px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.3);
        }

        /* --- Input --- */
        .input-group {
            margin-bottom: 8px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 8px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 3px;
            padding-left: 2px;
        }

        input[type="password"] {
            width: 100%;
            padding: 7px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            text-align: center;
            outline: none;
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 7px;
            border: none;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px var(--primary-glow);
        }

        .btn-primary:hover {
            background: #e60036;
            box-shadow: 0 4px 12px rgba(255, 0, 60, 0.6);
        }

        .btn-telegram-login {
            background: var(--telegram);
            color: white;
            margin-bottom: 6px;
            font-size: 8px;
        }

        .btn-telegram {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            margin-top: 6px;
            padding: 6px;
        }

        .error-msg {
            color: #ff003c;
            font-size: 9px;
            margin-top: 4px;
            min-height: 10px;
        }

        /* --- Main Display (ছোট এভিয়েটর সার্কেল) --- */
        .display-container {
            display: flex;
            justify-content: center;
            margin: 6px 0;
            border-top: 1px solid #222;
            padding-top: 6px;
        }

        .glowing-circle {
            width: 110px; 
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 60, 0.02) 0%, rgba(0, 0, 0, 0.6) 100%);
            border: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px var(--primary-glow), inset 0 0 10px var(--primary-glow);
            position: relative;
        }

        .multiplier {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        .status-lbl {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin-top: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <iframe class="game-frame" src="https://hgnice.cc/#/register?invitationCode=288531961584"></iframe>
    <canvas id="bg-canvas"></canvas>

    <div class="app-container" id="draggable-panel" style="top: 25%; left: 15%;">
        <div class="rgb-box">
            
            <div id="login-screen" class="glass-card">
                <h1 class="title">AVIATOR HACK</h1>
                <div class="input-group">
                    <label for="password">Access Key</label>
                    <input type="password" id="password" placeholder="••••">
                </div>
                <a href="https://t.me/NSsajid" target="_blank" class="btn btn-telegram-login">GET PASSWORD</a>
                <button class="btn btn-primary" onclick="validateLogin()">Login</button>
                <div id="error-box" class="error-msg"></div>
            </div>

            <div id="main-screen" class="glass-card hidden">
                <h1 class="title premium-title">AVIATOR HACK</h1>
                
                <div class="display-container">
                    <div class="glowing-circle" id="shield">
                        <div class="multiplier" id="display-value">1.00x</div>
                        <div class="status-lbl" id="status-text">READY</div>
                    </div>
                </div>

                <button class="btn btn-primary" id="signal-btn" onclick="generateSignal()">Get Signal</button>

                <a href="https://t.me/NexJobGlobal" target="_blank" class="btn btn-telegram">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.13 2.18a.5.5 0 0 0-.54-.11L1.8 8a.5.5 0 0 0-.01.93l6.22 2.68 10.3-6.57-6.57 10.3 2.68 6.22a.5.5 0 0 0 .93-.01l5.72-18.79a.5.5 0 0 0-.14-.54z"/></svg>
                    Join Channel
                </a>
            </div>

        </div>
    </div>

    <script>
        var isRunning = false;
        var DEFAULT_PASS = "sajid"; // আপনার এভিয়েটর পাসওয়ার্ড "sabbir" রাখা হলো

        // --- Web Audio Generator ---
        var audioCtx = null;
        function playTickSound(frequency, duration) {
            frequency = frequency || 580; duration = duration || 0.04;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                var osc = audioCtx.createOscillator(); var gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        // --- Animated Background (Particles) ---
        var canvas = document.getElementById('bg-canvas');
        var ctx = canvas.getContext('2d');
        var particles = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        var Particle = function() { this.reset(); };
        Particle.prototype.reset = function() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.2 + 0.4; this.speedY = -(Math.random() * 0.3 + 0.1);
            this.alpha = Math.random() * 0.4 + 0.1;
        };
        Particle.prototype.update = function() { this.y += this.speedY; if (this.y < 0) this.reset(); };
        Particle.prototype.draw = function() {
            ctx.fillStyle = 'rgba(255, 255, 255, ' + this.alpha + ')';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        };

        for (var i = 0; i < 20; i++) { particles.push(new Particle()); }

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(function(p) { p.update(); p.draw(); });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // --- Touch Dragging System ---
        const panel = document.getElementById('draggable-panel');
        let isDragging = false, offX, offY;

        panel.addEventListener('touchstart', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
                isDragging = true;
                offX = e.touches[0].clientX - panel.offsetLeft;
                offY = e.touches[0].clientY - panel.offsetTop;
            }
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let x = e.touches[0].clientX - offX; let y = e.touches[0].clientY - offY;
            x = Math.max(0, Math.min(x, window.innerWidth - panel.offsetWidth));
            y = Math.max(0, Math.min(y, window.innerHeight - panel.offsetHeight));
            panel.style.left = x + 'px'; panel.style.top = y + 'px';
        }, {passive: false});

        document.addEventListener('touchend', () => isDragging = false);

        // --- Login Controller ---
        function validateLogin() {
            var passInput = document.getElementById('password').value;
            var errorBox = document.getElementById('error-box');
            if (passInput === DEFAULT_PASS) {
                document.getElementById('login-screen').classList.add('hidden');
                setTimeout(function() {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-screen').classList.remove('hidden');
                }, 400);
            } else {
                errorBox.textContent = "WRONG KEY!";
                playTickSound(150, 0.2);
                setTimeout(function() { errorBox.textContent = ""; }, 3000);
            }
        }

        // --- Weighted Aviator Multiplier Algorithm ---
        function getWeightedMultiplier() {
            var rand = Math.random();
            if (rand < 0.60) return (Math.random() * 1.50 + 2.00).toFixed(2); // 2x to 3.5x
            else if (rand < 0.85) return (Math.random() * 0.89 + 1.10).toFixed(2); // 1.1x to 1.9x
            else if (rand < 0.97) return (Math.random() * 1.50 + 7.00).toFixed(2); // 7.x
            else return (Math.random() * 4.50 + 3.51).toFixed(2);
        }

        // --- Core Signal Animation Loop ---
        function generateSignal() {
            if (isRunning) return;
            
            isRunning = true;
            var btn = document.getElementById('signal-btn');
            var display = document.getElementById('display-value');
            var statusText = document.getElementById('status-text');
            
            btn.disabled = true;
            btn.style.opacity = "0.5";
            statusText.textContent = "SCANNING...";
            statusText.style.color = "#8a8a93";

            var iterations = 0;
            var totalIterations = 25;
            var currentIntervalTime = 60;

            function cycle() {
                iterations++;
                var mockVal = (Math.random() * 9 + 1).toFixed(2);
                display.textContent = mockVal + "x";
                
                playTickSound(600 + (iterations * 15), 0.03);

                if (iterations < totalIterations) {
                    if (iterations > 15) currentIntervalTime += 25;
                    if (iterations > 20) currentIntervalTime += 45;
                    setTimeout(cycle, currentIntervalTime);
                } else {
                    var finalSignal = getWeightedMultiplier();
                    display.textContent = finalSignal + "x";
                    
                    playTickSound(900, 0.15);
                    statusText.textContent = "SUCCESS";
                    statusText.style.color = "#00ff66";
                    
                    setTimeout(function() {
                        btn.disabled = false;
                        btn.style.opacity = "1";
                        isRunning = false;
                    }, 1000);
                }
            }
            cycle();
        }
    </script>
</body>
</html>
