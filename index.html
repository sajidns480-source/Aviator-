<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>☸Ɇ戀₦₴࿐</title>
    <style>
       @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Rajdhani:wght=700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background: #000; font-family: 'Rajdhani', sans-serif; 
        }

        .game-frame { 
            width: 100%; height: 100%; border: none; 
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        #draggable-panel {
            position: fixed; top: 20%; left: 15%; z-index: 1000;
            width: 175px; touch-action: none;
        }

        .profile-wrap {
            position: absolute; top: -22px; left: 50%;
            transform: translateX(-50%); width: 45px; height: 45px;
            border-radius: 50%; padding: 2px;
            background: #00ff00;
            z-index: 1010; box-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
        }
        .profile-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }

        .rgb-box {
            padding: 2px;
            border-radius: 12px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            animation: move-border 8s linear infinite;
        }

        @keyframes move-border {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        .main-container {
            background: #070708;
            border-radius: 10px;
            padding: 25px 6px 8px 6px;
            text-align: center;
        }

        #login-page { display: flex; flex-direction: column; gap: 6px; }
        .login-title { color: #ffd700; font-size: 9px; font-family: 'Orbitron', sans-serif; }
        .pass-input { 
            background: #111; border: 1px solid #00ff00; border-radius: 4px; 
            color: #fff; padding: 6px; text-align: center; font-size: 11px; outline: none;
        }
        .login-btn { 
            background: linear-gradient(90deg, #00ff00, #0088ff); border: none; 
            padding: 6px; border-radius: 4px; color: #000; font-weight: 900; 
            cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 9px;
        }
        .get-pass-btn {
            background: #111; border: 1px solid #00e5ff; padding: 4px; 
            border-radius: 4px; color: #00e5ff; font-weight: 700; text-decoration: none;
            cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 8px;
        }

        #hack-page { display: none; }

        .user-name {
            color: #00e5ff; font-family: 'Orbitron', sans-serif;
            font-size: 9px; font-weight: 900; margin-bottom: 4px;
        }

        .top-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 5px; padding: 4px 6px; margin-bottom: 4px;
        }
        .period-info { text-align: left; }
        .period-title { color: #aaa; font-size: 7px; font-family: 'Orbitron', sans-serif; }
        .period-number { color: #fff; font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; }
        
        .timer-mini {
            background: #ff0055; color: #fff; font-family: 'Orbitron', sans-serif;
            font-size: 11px; font-weight: 900; padding: 2px 6px; border-radius: 3px;
            box-shadow: 0 0 5px rgba(255, 0, 85, 0.4);
        }

        .fake-info-box {
            background: rgba(0, 255, 229, 0.01);
            border: 1px solid rgba(0, 255, 229, 0.08);
            border-radius: 5px; padding: 4px; margin-bottom: 5px;
            text-align: left; font-size: 8px; font-family: 'Orbitron', sans-serif;
            color: #00ffc6; line-height: 1.2;
        }
        .fake-line { display: flex; justify-content: space-between; margin-bottom: 1px; }
        .status-green { color: #00ff00; text-shadow: 0 0 3px #00ff00; }
        .status-blue { color: #0088ff; }

        .result-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.02); border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 5px; padding: 4px 6px; margin-bottom: 5px;
        }
        .signal-text { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; }
        .up-signal { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .down-signal { color: #ff3333; text-shadow: 0 0 10px #ff3333; }
        .number-text { color: #ffd700; font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; }

        /* নতুন সিগন্যাল বাটন স্টাইল */
        .get-signal-btn {
            width: 100%; background: linear-gradient(90deg, #ff0055, #ff00aa); border: none;
            padding: 6px; border-radius: 4px; color: #fff; font-weight: 900;
            cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 9px;
            margin-bottom: 5px; letter-spacing: 0.5px; transition: 0.2s;
        }
        .get-signal-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .telegram-btn {
            display: block; background: linear-gradient(135deg, #0088cc, #00a2ed); 
            color: #fff; text-decoration: none;
            font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: bold;
            padding: 4px; border-radius: 4px; letter-spacing: 0.5px;
        }
    </style>
<link rel="me" href="https://www.blogger.com/profile/15382680588395067201" />
<meta name='google-adsense-platform-account' content='ca-host-pub-1556223355139109'/>

</head>
<body>

    <iframe class="game-frame" src="http://nex-trade-rocket-xjnz.vercel.app"></iframe>

    <div id="draggable-panel">
        <div class="profile-wrap">
            <img src="https://i.postimg.cc/yN1yx00H/1772112830239.png" alt="NS Sajiid">
        </div>
        
        <div class="rgb-box">
            <div class="main-container">
                
                <div id="login-page">
                    <div class="login-title">☸Ɇ戀₦₴࿐?</div>
                    <input type="password" id="pass-key" class="pass-input" placeholder="PASSWORD">
                    <button class="login-btn" onclick="checkPass()">LOGIN</button>
                    <a href="https://t.me/NSsajid" target="_blank" class="get-pass-btn">GET PASSWORD</a>
                </div>

                <div id="hack-page">
                    <div class="user-name">☸Ɇ戀₦₴࿐?</div>
                    
                    <div class="top-row">
                        <div class="period-info">
                            <span class="period-title">PERIOD: </span>
                            <span class="period-number" id="period-id">---</span>
                        </div>
                        <div class="timer-mini" id="timer-val">30</div>
                    </div>

                    <div class="fake-info-box">
                        <div class="fake-line"><span>SERVER HOST:</span> <span id="fake-server" class="status-green">NO</span></div>
                        <div class="fake-line"><span>DATA CODES:</span> <span id="fake-data" class="status-blue">DESH_99X</span></div>
                        <div class="fake-line"><span>INJECT STATUS:</span> <span class="status-green">SUCCESSFUL</span></div>
                        <div class="fake-line"><span>ACCURACY:</span> <span id="fake-accuracy" style="color:#ffd700;">99.4%</span></div>
                    </div>
                    
                    <div class="result-row">
                        <div class="signal-text up-signal" id="signal-label">WAIT</div>
                        <div class="number-text" id="number-label">NUM: --</div>
                    </div>

                    <button class="get-signal-btn" id="click-signal-btn" onclick="generateClickSignal()">GET SIGNAL</button>
                    
                    <a href="https://t.me/NexJobGlobal" target="_blank" class="telegram-btn">TELEGRAM CHANNEL</a>
                </div>

            </div>
        </div>
    </div>

    <script>
        var isScanning = false;

        function checkPass() {
            const pass = document.getElementById('pass-key').value;
            if (pass === "nssajid") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('hack-page').style.display = 'block';
                startTimerLoop();
            } else {
                alert("WRONG PASSWORD!");
            }
        }

        // --- ড্রাগিং সিস্টেম ---
        const panel = document.getElementById('draggable-panel');
        let isDragging = false, offX, offY;

        panel.addEventListener('touchstart', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
                isDragging = true;
                offX = e.touches[0].clientX - panel.offsetLeft;
                offY = e.touches[0].clientY - panel.offsetTop;
            }
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let x = e.touches[0].clientX - offX;
            let y = e.touches[0].clientY - offY;
            x = Math.max(0, Math.min(x, window.innerWidth - panel.offsetWidth));
            y = Math.max(0, Math.min(y, window.innerHeight - panel.offsetHeight));
            panel.style.left = x + 'px';
            panel.style.top = y + 'px';
        }, {passive: false});

        document.addEventListener('touchend', () => isDragging = false);

        // --- রিয়েল-টাইম পিরিয়ড ও টাইমার লুপ (সিগন্যাল অটো চেঞ্জ হবে না) ---
        function startTimerLoop() {
            setInterval(() => {
                const now = new Date();
                const seconds = now.getSeconds();
                const rem = 30 - (seconds % 30);
                document.getElementById('timer-val').innerText = rem;

                const interval = Math.floor(((now.getHours() * 3600) + (now.getMinutes() * 60) + seconds) / 30);
                document.getElementById('period-id').innerText = (interval + 1).toString().slice(-3);
            }, 1000);
        }

        // --- বাটন ক্লিক করলে সিগন্যাল দেখানোর মূল লজিক ---
        function generateClickSignal() {
            if (isScanning) return;
            isScanning = true;

            const btn = document.getElementById('click-signal-btn');
            const label = document.getElementById('signal-label');
            const numLabel = document.getElementById('number-label');

            btn.disabled = true;
            btn.innerText = "SCANNING...";
            label.innerText = "WAIT";
            label.className = "signal-text up-signal";
            numLabel.innerText = "NUM: --";

            let count = 0;
            // এভিয়েটরের মতো স্ক্যানিং অ্যানিমেশন ইফেক্ট
            const shuffleInterval = setInterval(() => {
                label.innerText = Math.random() > 0.5 ? "উপরে যাবে" : "নিচে যাবে";
                numLabel.innerText = `NUM: ${Math.floor(Math.random() * 10)}`;
                count++;

                if (count > 12) { // ১.২ সেকেন্ড পর ফাইনাল রেজাল্ট আসবে
                    clearInterval(shuffleInterval);

                    const isUp = Math.random() > 0.5;
                    label.innerText = isUp ? "উপরে যাবে" : "নিচে যাবে";
                    label.className = `signal-text ${isUp ? 'up-signal' : 'down-signal'}`;

                    let lotteryNum = isUp ? Math.floor(Math.random() * 5) + 5 : Math.floor(Math.random() * 5);
                    numLabel.innerText = `NUM: ${lotteryNum}`;

                    // ফেক ইনফো আপডেট
                    const randomAccuracy = (97 + Math.random() * 2).toFixed(1) + "%";
                    const fakeHex = "DESH_" + Math.floor(10 + Math.random() * 89) + "X";
                    const fakeSvr = "SVR_DESH_" + Math.floor(100 + Math.random() * 899);
                    
                    document.getElementById('fake-accuracy').innerText = randomAccuracy;
                    document.getElementById('fake-data').innerText = fakeHex;
                    document.getElementById('fake-server').innerText = fakeSvr;

                    btn.disabled = false;
                    btn.innerText = "GET SIGNAL";
                    isScanning = false;
                }
            }, 100);
        }
    </script>
</body>
</html>
